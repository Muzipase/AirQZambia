services:
  - type: web
    name: air-quality-hybrid-framework
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_API_TOKEN
        generateValue: true
